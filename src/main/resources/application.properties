spring.application.name=gestao-gepa

# Configuração da conexão com o banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/gepa_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

# Configuração do Hibernate para criar/atualizar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra no console o comando SQL que o Spring está executando
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true